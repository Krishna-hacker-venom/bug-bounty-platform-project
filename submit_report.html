<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit New Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    
    <main class="max-w-4xl mx-auto p-4 md:p-8">
        <h2 class="text-3xl font-extrabold text-gray-900 mb-2">Bug Report Form</h2>
        
        <div class="bg-white p-6 md:p-10 rounded-xl shadow-2xl border border-gray-200">
            <form id="submissionForm" action="/submit-bug" method="POST" enctype="multipart/form-data" class="space-y-6">
                
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Your Email *</label>
                    <input type="email" id="email" name="email" required 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 shadow-sm transition">
                    <span id="emailError" class="text-red-500 text-xs hidden">Please enter a valid email address.</span>
                </div>
                
                <div>
                    <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Vulnerability Title *</label>
                    <input type="text" id="title" name="title" required minlength="5"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 shadow-sm transition">
                    <span id="titleError" class="text-red-500 text-xs hidden">Title must be at least 5 characters long.</span>
                </div>

                <div>
                    <label for="steps" class="block text-sm font-medium text-gray-700 mb-1">Detailed Steps to Reproduce *</label>
                    <textarea id="steps" name="steps" rows="6" required minlength="20"
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 shadow-sm transition"></textarea>
                    <span id="stepsError" class="text-red-500 text-xs hidden">Please provide more detailed steps (min 20 chars).</span>
                </div>
                
                <div>
                    <label for="attachments" class="block text-sm font-medium text-gray-700 mb-1">Proof of Concept (PoC)</label>
                    <input type="file" id="attachments" name="attachments" multiple 
                           accept=".pdf,.png,.jpg,.jpeg,.txt" 
                           class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                    <span id="fileError" class="text-red-500 text-xs hidden">One or more files exceed the 5MB limit.</span>
                </div>

                <button type="submit" class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-lg shadow-xl hover:bg-indigo-700 transition">
                    Report Bug
                </button>
            </form>
        </div>
    </main>

    <script>
        const form = document.getElementById('submissionForm');
        
        form.addEventListener('submit', function(event) {
            let isValid = true;
            
            // Reset errors
            document.querySelectorAll('span[id$="Error"]').forEach(el => el.classList.add('hidden'));

            // Validate Text Fields
            const title = document.getElementById('title').value.trim();
            if (title.length < 5) {
                document.getElementById('titleError').classList.remove('hidden');
                isValid = false;
            }

            const steps = document.getElementById('steps').value.trim();
            if (steps.length < 20) {
                document.getElementById('stepsError').classList.remove('hidden');
                isValid = false;
            }

            // Validate Files
            const files = document.getElementById('attachments').files;
            const maxFileSize = 5 * 1024 * 1024; // 5MB
            for (let file of files) {
                if (file.size > maxFileSize) {
                    document.getElementById('fileError').classList.remove('hidden');
                    isValid = false;
                    break;
                }
            }

            if (!isValid) {
                event.preventDefault(); // Stop form submission
            }
        });
    </script>
</body>
</html>
